## docker-compose.yaml
## Keycloak + PostgreSQL (Production Setup)

services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres_db1
    restart: always

    environment:
      POSTGRES_DB: keycloak_db           # The default database to create
      POSTGRES_USER: keycloak       # The default user to create
      POSTGRES_PASSWORD: keycloak   # Password for the default user and postgres superuser
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - ./postgres_init:/docker-entrypoint-initdb.d:ro
      #- ./postgres_init/1.pagila-schema.sql:/docker-entrypoint-initdb.d/1.pagila-schema.sql
      - ./pg_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:  
    image: quay.io/keycloak/keycloak:26.4.2
    container_name: keycloak_ct1
    restart: always

    command: ["start-dev", "--import-realm"]  ## Start in Development mode and loads realm JSON from "/opt/keycloak/data/import" (if present)

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin  ## Initial admin user for Keycloak login
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_DB: postgres   ## Keycloak will use PostgreSQL database engine (dev-file, dev-mem, mysql, mariadb, mssql, oracle)

      ## JDBC connection string:
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db   ## postgres:5432 (Docker service name) + PostgreSQL database 
      KC_DB_USERNAME: keycloak   ## PostgreSQL credentials
      KC_DB_PASSWORD: keycloak

      KC_HEALTH_ENABLED: "true"

    ports:
      - "8080:8080" ## Exposes Keycloak UI on http://localhost:8080

    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro


